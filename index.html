<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>e-Myoum — Jeux</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    background: #120b08;
    color: #f4e6cf;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    background:
      radial-gradient(circle at 50% 35%, rgba(226,160,68,0.15), transparent 60%),
      #120b08;
    overflow: hidden;
  }
  .wrap {
    text-align: center;
    padding: 40px 24px;
    max-width: 480px;
  }
  h1 {
    font-size: clamp(2rem, 6vw, 3rem);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: #f4e6cf;
    text-shadow: 0 0 24px rgba(217, 84, 46, 0.6);
    margin-bottom: 0.5rem;
  }
  p.tagline {
    color: #b89a7a;
    margin-bottom: 2.5rem;
    font-size: 1rem;
  }
  nav.menu {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .menu a {
    display: block;
    position: relative;
    text-decoration: none;
    color: #f4e6cf;
    background: linear-gradient(180deg, rgba(58,29,15,0.9), rgba(28,14,7,0.9));
    border: 2px solid #d9542e;
    border-radius: 10px;
    padding: 16px 20px;
    font-size: 1.1rem;
    font-weight: bold;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: transform 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
  }
  .menu a:hover, .menu a:focus-visible {
    transform: translateY(-2px);
    box-shadow: 0 6px 18px rgba(217, 84, 46, 0.35);
    background: linear-gradient(180deg, rgba(217,84,46,0.25), rgba(58,29,15,0.9));
  }
  .menu a .desc {
    display: block;
    font-size: 0.8rem;
    font-weight: normal;
    text-transform: none;
    letter-spacing: normal;
    color: #b89a7a;
    margin-top: 4px;
  }
  footer {
    margin-top: 2.5rem;
    font-size: 0.75rem;
    color: #5c4a3a;
  }
</style>
</head>
<body>
  <div class="wrap">
    <h1>e-Myoum</h1>
    <p class="tagline">Jeux 2D faits maison</p>
    <nav class="menu">
      <a href="wasteland-riders/">
        Wasteland Riders
        <span class="desc">Course de moto façon Mad Max, survis le plus longtemps possible</span>
      </a>
    </nav>
    <footer>&copy; e-Myoum</footer>
  </div>
</body>
</html>
